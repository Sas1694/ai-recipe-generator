name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Check types
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build Next.js app
        run: npm run build

      - name: Run tests
        run: npm run test:run